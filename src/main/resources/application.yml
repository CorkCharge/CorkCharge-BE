spring:
  application:
    name: corkCharge
  profiles:
    group:
      local: db-local, port-local, common
      prod: db-prod, port-prod, common
    active: local
---

# local DB
spring:
  config:
    activate:
      on-profile: db-local

  datasource:
    url: ${LOCAL_DB_URL}
    username: ${LOCAL_DB_USER}
    password: ${LOCAL_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver


  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  docker:
    compose:
      enabled: false
---

# prod DB
spring:
  config:
    activate:
      on-profile: db-prod
  datasource:
    url: ${PROD_DB_URL}
    username: ${PROD_DB_USER}
    password: ${PROD_DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  docker:
    compose:
      enabled: true
---
spring:
  config:
    activate:
      on-profile: port-prod

server:
  port: 9000
  servlet:
    context-path: /

---
spring:
  config:
    activate:
      on-profile: port-local

server:
  port: 8000
  servlet:
    context-path: /

---

spring:
  config:
    activate:
      on-profile: common

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui/index.html

openApi:
  serviceKey: ${OPEN_API_KEY}
  baseUrl: ${OPEN_API_BASE_URL}

cloud:
  aws:
    credentials:
      accessKey: ${AWS_ACCESS_KEY_ID}
      secretKey: ${AWS_SECRET_ACCESS_KEY}
    s3:
      region: ap-northeast-2
      bucket: ${AWS_S3_BUCKET}
      base-url: ${AWS_S3_BASE_URL}
